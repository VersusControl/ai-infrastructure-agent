# Example configuration for Google AI (Gemini) provider
aws:
  region: "ap-southeast-1"

mcp:
  server_name: "aws-infrastructure-server"
  version: "1.0.0"

agent:
  provider: "gemini"              # Use Google AI (Gemini)
  model: "gemini-2.5-flash-lite"
  gemini_api_key: "AIzaSyDumbbTLOK7lILxqvFFq7Snj7xOFrzyFZE"
  max_tokens: 20000
  temperature: 0.1
  dry_run: false
  auto_resolve_conflicts: false
  enable_debug: true
  step_delay_ms: 1000
  # Note: Set GEMINI_API_KEY environment variable

logging:
  level: "info"
  format: "text"
  output: "stdout"

state:
  file_path: "./states/infrastructure-state.json"
  backup_enabled: true
  backup_dir: "./backups"

web:
  port: 8080
  host: "localhost"
  template_dir: "web/templates"
  static_dir: "web/static"
  enable_websockets: true
